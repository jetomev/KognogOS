# ── Office and productivity ───────────────────────────────────────────────────
[productivity]
description = "Office suite and productivity apps"
packages = [
    "onlyoffice-bin",   # office suite (AUR)
    "obsidian",         # note taking (AUR)
    "thunderbird",      # email client
    "okular",           # document viewer
]

# ── Media ─────────────────────────────────────────────────────────────────────
[media]
description = "Media players and editors"
packages = [
    "vlc",              # video player
    "elisa",            # music player
    "gimp",             # image editor
    "pinta",            # simple image editor
]

# ── Browser ───────────────────────────────────────────────────────────────────
[browser]
description = "Default web browser"
packages = [
    "brave-bin",        # default browser (AUR)
]

# ── Communication ─────────────────────────────────────────────────────────────
[communication]
description = "Communication apps"
packages = [
    "discord",          # voice and text chat
    "telegram-desktop", # messaging
]

# ── Development ───────────────────────────────────────────────────────────────
[development]
description = "Developer tools and languages"
packages = [
    "base-devel",                 # build tools
    "rust",                       # Rust toolchain via rustup
    "python",                     # Python 3
    "python-pip",                 # Python package manager
    "visual-studio-code-bin",     # VS Code (AUR)
    "git",                        # version control
]

# ── Gaming ────────────────────────────────────────────────────────────────────
[gaming]
description = "Gaming stack"
packages = [
    "steam",                      # Steam client
    "lutris",                     # game launcher
    "heroic-games-launcher-bin",  # Epic/GOG launcher (AUR)
    "wine",                       # Windows compatibility
    "proton-ge-custom-bin",       # GE-Proton (AUR)
    "retroarch",                  # emulation frontend
    "lib32-mesa",                 # 32-bit graphics
    "lib32-nvidia-utils",         # Nvidia 32-bit (if Nvidia)
]

# ── Drivers ───────────────────────────────────────────────────────────────────
[drivers]
description = "GPU drivers"
packages = [
    "mesa",             # AMD/Intel open source
    "vulkan-radeon",    # AMD Vulkan
    "nvidia",           # Nvidia proprietary (Tier 1)
    "nvidia-utils",     # Nvidia utilities
]

# ── Wallpapers ────────────────────────────────────────────────────────────────
[wallpapers]
description = "KognogOS default wallpapers — used in SDDM, Calamares, and KDE"
files = [
    # Arch-emphasis variants (heritage)
    "assets/wallpapers/Kognog OS Arch - Logo Black.png",
    "assets/wallpapers/Kognog OS Arch - Logo Catpuccin Mocha.png",
    "assets/wallpapers/Kognog OS Arch - Logo Gray.png",
    "assets/wallpapers/Kognog OS Arch - Logo Green.png",
    "assets/wallpapers/Kognog OS Arch - Logo White.png",
    # Semi-rolling-emphasis variants (identity)
    "assets/wallpapers/Kognog OS Semi - Logo Black.png",
    "assets/wallpapers/Kognog OS Semi - Logo Catpuccin Mocha.png",
    "assets/wallpapers/Kognog OS Semi - Logo Gray.png",
    "assets/wallpapers/Kognog OS Semi - Logo Green.png",
    "assets/wallpapers/Kognog OS Semi - Logo White.png",
]
default = "Kognog OS Semi - Logo Catpuccin Mocha.png"

# ── Web shortcuts ─────────────────────────────────────────────────────────────
[web_shortcuts]
description = "Web app shortcuts installed as desktop entries"
shortcuts = [
    "claude.ai",        # Claude AI assistant
    "web.whatsapp.com", # WhatsApp Web
]