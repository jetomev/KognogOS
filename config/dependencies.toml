# KognogOS — System Dependencies
# This file documents all non-standard packages required by KognogOS tooling.
# Used as reference for the Calamares installer profiles.
# Install with: nog install <package>

# ── nog package manager ───────────────────────────────────────────────────────

[nog]
description = "nog — KognogOS tier-aware package manager (runtime)"
language = "rust"
packages = [
    "pacman-contrib",   # checkupdates — used for tier update notifications
]

[nog_build]
description = "nog — build from source (developers only, not required for end users)"
packages = [
    "rust",             # Rust toolchain via rustup
    "base-devel",       # build tools
]

# ── Terminal welcome box (sysinfo.py) ─────────────────────────────────────────

[sysinfo]
description = "Terminal welcome box — system info + tier notifications"
language = "python"
packages = [
    "python-rich",      # terminal styling and layout
    "python-psutil",    # CPU, memory, disk stats
]

# ── Default shell and terminal ────────────────────────────────────────────────

[shell]
description = "Default shell and terminal emulator"
packages = [
    "fish",                       # default shell
    "alacritty",                  # default terminal emulator
    "alacrittyforge",             # Alacritty TUI configurator (AUR)
    "ttf-jetbrains-mono-nerd",    # default terminal font
    "fzf",                        # fuzzy finder (required by fzf.fish)
]

[shell_config]
description = "KognogOS default terminal configuration files"
files = [
    "config/alacritty.toml       → ~/.config/alacritty/alacritty.toml",
    "config/config.fish          → ~/.config/fish/config.fish",
    "config/fish_greeting.fish   → ~/.config/fish/functions/fish_greeting.fish",
    "config/sysinfo.py           → ~/.config/fish/sysinfo.py",
    "config/tide_config.fish     → run once after fisher install to configure prompt",
]

[fish_plugins]
description = "Fish shell plugins — installed via fisher"
manager = "fisher"
plugins = [
    "jorgebucaran/fisher",          # Fish plugin manager
    "ilancosman/tide@v6",           # prompt theme
    "jorgebucaran/autopair.fish",   # auto-closing brackets
    "patrickf1/fzf.fish",           # fuzzy finder integration
    "meaningful-ooo/sponge",        # clean failed commands from history
    "catppuccin/fish",              # Catppuccin Mocha color theme
]

# ── System tools ──────────────────────────────────────────────────────────────

[system_tools]
description = "Pre-installed system utilities"
packages = [
    "btop",             # system monitor
    "grubforge",        # GRUB TUI manager (AUR)
    "alacrittyforge",   # Alacritty TUI configurator (AUR)
    "fresh",            # recommended terminal editor (AUR)
]

# ── Desktop environment ───────────────────────────────────────────────────────

[desktop]
description = "KDE Plasma desktop stack"
packages = [
    "plasma-meta",
    "plasma-desktop",
    "sddm",
    "pipewire",
    "pipewire-pulse",
    "wireplumber",
    "networkmanager",
    "dolphin",
    "konsole",
    "kate",
    "spectacle",
    "ark",
]

# ── Office and productivity ───────────────────────────────────────────────────

[productivity]
description = "Office suite and productivity apps"
packages = [
    "onlyoffice-bin",   # office suite (AUR)
    "obsidian",         # note taking (AUR)
    "thunderbir